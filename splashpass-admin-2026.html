<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SplashPass Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d1b2a;
  --navy2: #152236;
  --navy3: #1e3050;
  --gold: #f5a623;
  --white: #f0f4f8;
  --grey: #8a9bb0;
  --success: #2ecc71;
  --danger: #e74c3c;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--navy); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
h1,h2,h3 { font-family: 'Syne', sans-serif; }
.hidden { display: none !important; }
.btn { display: inline-block; padding: 12px 24px; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; border: none; transition: all .2s; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-gold { background: var(--gold); color: var(--navy); }
.btn-outline { background: transparent; color: var(--white); border: 1.5px solid var(--navy3); }
.btn-danger { background: var(--danger); color: white; }
.btn-full { width: 100%; display: block; text-align: center; }
input, select { width: 100%; padding: 12px 16px; background: var(--navy2); border: 1.5px solid var(--navy3); border-radius: 10px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border .2s; }
input:focus, select:focus { border-color: var(--gold); }
input::placeholder { color: var(--grey); }
label { display: block; font-size: 12px; color: var(--grey); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
.form-group { margin-bottom: 16px; }
.form-error { color: var(--danger); font-size: 13px; margin-top: 4px; }

/* LOGIN */
#screen-login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.login-card { background: var(--navy2); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; border: 1px solid var(--navy3); }
.login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.login-icon { width: 40px; height: 40px; background: var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--navy); }
.login-tag { font-size: 12px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 24px; }

/* ADMIN */
#screen-admin { display: none; }
.admin-nav { background: var(--navy2); border-bottom: 1px solid var(--navy3); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
.admin-nav-logo { display: flex; align-items: center; gap: 10px; }
.admin-nav-icon { width: 32px; height: 32px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; color: var(--navy); }
.admin-nav-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; }
.admin-nav-tag { font-size: 11px; color: var(--gold); font-weight: 700; }
.admin-nav-user { font-size: 12px; color: var(--grey); margin-right: 12px; }
.admin-body { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }
.admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card { background: var(--navy2); border-radius: 12px; padding: 20px; border: 1px solid var(--navy3); }
.stat-num { font-size: 32px; font-weight: 800; color: var(--gold); font-family: 'Syne', sans-serif; }
.stat-label { font-size: 12px; color: var(--grey); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }
.section { background: var(--navy2); border-radius: 14px; padding: 24px; border: 1px solid var(--navy3); margin-bottom: 24px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-size: 18px; font-weight: 800; }
.op-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.op-card { background: var(--navy3); border-radius: 12px; padding: 16px; border: 1px solid rgba(255,255,255,.05); }
.op-card-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.op-card-email { font-size: 13px; color: var(--grey); margin-bottom: 4px; }
.op-card-point { font-size: 12px; color: var(--gold); font-weight: 600; margin-bottom: 12px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; display: none; align-items: center; justify-content: center; padding: 24px; }
.modal-overlay.show { display: flex; }
.modal { background: var(--navy2); border-radius: 16px; padding: 28px; width: 100%; max-width: 420px; border: 1px solid var(--navy3); }
.modal h3 { font-size: 20px; margin-bottom: 20px; }
.sub-table { width: 100%; border-collapse: collapse; }
.sub-table th { text-align: left; font-size: 11px; color: var(--grey); text-transform: uppercase; letter-spacing: .5px; padding: 8px 12px; border-bottom: 1px solid var(--navy3); }
.sub-table td { padding: 12px; font-size: 14px; border-bottom: 1px solid var(--navy3); }
.sub-table tr:last-child td { border-bottom: none; }
.status-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 100px; }
.badge-active { background: rgba(46,204,113,.15); color: var(--success); }
.badge-pending { background: rgba(245,166,35,.15); color: var(--gold); }

#toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy2); border: 1px solid var(--navy3); border-left: 4px solid var(--gold); padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 999; transform: translateY(80px); opacity: 0; transition: all .3s; }
#toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">S</div>
      <div>
        <div style="font-family:Syne,sans-serif;font-size:18px;font-weight:800">SplashPass</div>
      </div>
    </div>
    <div class="login-tag">Admin Panel</div>
    <div class="form-group"><label>Email</label><input type="email" id="admin-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')adminLogin()"></div>
    <div class="form-group"><label>Password</label><input type="password" id="admin-pass" placeholder="Your password" onkeydown="if(event.key==='Enter')adminLogin()"></div>
    <div id="admin-error" class="form-error"></div>
    <button class="btn btn-gold btn-full" id="admin-login-btn" onclick="adminLogin()">Access Admin Panel</button>
  </div>
</div>

<!-- ADMIN -->
<div id="screen-admin">
  <div class="admin-nav">
    <div class="admin-nav-logo">
      <div class="admin-nav-icon">S</div>
      <div>
        <div class="admin-nav-title">SplashPass</div>
        <div class="admin-nav-tag">Admin Panel</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="admin-nav-user" id="admin-nav-email"></span>
      <button class="btn btn-outline" onclick="adminLogout()" style="padding:8px 16px;font-size:13px">Log Out</button>
    </div>
  </div>

  <div class="admin-body">
    <div class="admin-stats">
      <div class="stat-card"><div class="stat-num" id="stat-operators">0</div><div class="stat-label">Operators</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-subscribers">0</div><div class="stat-label">Subscribers</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-bookings">0</div><div class="stat-label">Total Bookings</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-revenue" style="font-size:20px">KSh 0</div><div class="stat-label">Est. Revenue</div></div>
    </div>

    <!-- WASH POINTS -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">Wash Points</div>
        <button class="btn btn-gold" onclick="showAddPointModal()">+ Add Wash Point</button>
      </div>
      <div class="op-grid" id="wash-points-grid">
        <div style="color:var(--grey);font-size:14px">Loading...</div>
      </div>
    </div>

    <!-- OPERATORS -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">Wash Point Operators</div>
        <button class="btn btn-gold" onclick="showCreateModal()">+ Add Operator</button>
      </div>
      <div class="op-grid" id="operators-grid">
        <div style="color:var(--grey);font-size:14px">Loading...</div>
      </div>
    </div>

    <!-- SUBSCRIBERS -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">Subscribers</div>
        <button class="btn btn-outline" onclick="loadData()">↻ Refresh</button>
      </div>
      <div style="overflow-x:auto">
        <table class="sub-table">
          <thead><tr><th>Name</th><th>Phone</th><th>Plan</th><th>Credits</th><th>Status</th><th>Plate</th></tr></thead>
          <tbody id="subs-table-body">
            <tr><td colspan="6" style="color:var(--grey);text-align:center;padding:20px">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- CREATE OPERATOR MODAL -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h3>Add New Operator</h3>
    <div class="form-group"><label>Full Name</label><input type="text" id="new-op-name" placeholder="John Kamau"></div>
    <div class="form-group"><label>Email</label><input type="email" id="new-op-email" placeholder="john@splashpass.co.ke"></div>
    <div class="form-group"><label>Password</label><input type="password" id="new-op-pass" placeholder="Temporary password"></div>
    <div class="form-group">
      <label>Assign Wash Point</label>
      <select id="new-op-point">
        <option value="">Select wash point</option>
      </select>
    </div>
    <div id="create-error" class="form-error"></div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-gold" id="create-btn" onclick="createOperator()" style="flex:1">Create Operator</button>
      <button class="btn btn-outline" onclick="hideCreateModal()" style="flex:1">Cancel</button>
    </div>
  </div>
</div>

<!-- ADD WASH POINT MODAL -->
<div class="modal-overlay" id="add-point-modal">
  <div class="modal">
    <h3>Add Wash Point</h3>
    <div class="form-group"><label>Name</label><input type="text" id="new-point-name" placeholder="SplashPass Nyali"></div>
    <div class="form-group"><label>Area / Suburb</label><input type="text" id="new-point-area" placeholder="Nyali, Mombasa"></div>
    <div class="form-group"><label>Latitude</label><input type="number" step="any" id="new-point-lat" placeholder="-4.0435"></div>
    <div class="form-group"><label>Longitude</label><input type="number" step="any" id="new-point-lng" placeholder="39.7173"></div>
    <div id="add-point-error" class="form-error"></div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-gold" id="add-point-btn" onclick="createWashPoint()" style="flex:1">Add Wash Point</button>
      <button class="btn btn-outline" onclick="hideAddPointModal()" style="flex:1">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var SUPABASE_URL = 'https://msdvyiqjoogafzyaoycg.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_N_g24aU7TLHLNeu72gnfeg_1d7OleFW';

// Holds the authenticated session token — null until login
var accessToken = null;

// ── SUPABASE FETCH (uses session token when available) ────────────
async function sbFetch(path, options) {
  options = options || {};
  var token = accessToken || SUPABASE_ANON_KEY;
  var res = await fetch(SUPABASE_URL + '/rest/v1/' + path, Object.assign({}, options, {
    headers: Object.assign({
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || 'return=representation'
    }, options.headers || {})
  }));
  if (!res.ok) {
    var err = await res.json().catch(function() { return {}; });
    throw new Error(err.message || 'Request failed (' + res.status + ')');
  }
  var text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── AUTH API FETCH (Supabase Auth endpoints) ──────────────────────
async function authFetch(path, body) {
  var res = await fetch(SUPABASE_URL + '/auth/v1/' + path, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  var data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || 'Auth failed');
  return data;
}

// ── TOAST & BUTTON HELPERS ────────────────────────────────────────
function toast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--gold)';
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3500);
}
function setBtn(id, loading, label) {
  var b = document.getElementById(id);
  if (!b) return;
  b.disabled = loading;
  b.textContent = loading ? 'Please wait...' : label;
}

// ── AUTH ──────────────────────────────────────────────────────────
async function adminLogin() {
  var email = document.getElementById('admin-email').value.trim().toLowerCase();
  var pass  = document.getElementById('admin-pass').value;
  var err   = document.getElementById('admin-error');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Please enter your email and password.'; return; }
  setBtn('admin-login-btn', true, 'Access Admin Panel');
  try {
    var data = await authFetch('token?grant_type=password', { email: email, password: pass });
    accessToken = data.access_token;
    document.getElementById('admin-nav-email').textContent = email;
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-admin').style.display = 'block';
    loadData();
  } catch(e) {
    err.textContent = e.message === 'Invalid login credentials'
      ? 'Incorrect email or password.'
      : 'Login failed: ' + e.message;
  } finally {
    setBtn('admin-login-btn', false, 'Access Admin Panel');
  }
}

async function adminLogout() {
  // Revoke the session server-side
  try {
    await fetch(SUPABASE_URL + '/auth/v1/logout', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + accessToken }
    });
  } catch(e) { /* ignore */ }
  accessToken = null;
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('screen-admin').style.display = 'none';
  document.getElementById('admin-email').value = '';
  document.getElementById('admin-pass').value = '';
  document.getElementById('admin-nav-email').textContent = '';
}

// ── DATA ──────────────────────────────────────────────────────────
async function loadData() {
  try {
    var operators   = await sbFetch('operators?select=*&order=created_at.desc');
    var subscribers = await sbFetch('profiles?select=*&order=created_at.desc');
    var bookings    = await sbFetch('bookings?select=*');
    var washPoints  = await sbFetch('wash_points?select=*&order=name.asc');

    document.getElementById('stat-operators').textContent   = operators.length;
    document.getElementById('stat-subscribers').textContent = subscribers.length;
    document.getElementById('stat-bookings').textContent    = bookings.length;
    var rev = subscribers.reduce(function(s,u) { return s + (u.plan_price ? parseInt(u.plan_price)*4 : 0); }, 0);
    document.getElementById('stat-revenue').textContent = 'KSh ' + rev.toLocaleString();

    renderWashPoints(washPoints);
    renderOperators(operators);
    renderSubscribers(subscribers);
    populatePointDropdown(washPoints);
  } catch(e) {
    // If token expired mid-session, force re-login
    if (e.message && e.message.includes('401')) {
      toast('Session expired. Please log in again.', true);
      adminLogout();
    } else {
      toast('Error loading data: ' + e.message, true);
    }
  }
}

// ── WASH POINTS ───────────────────────────────────────────────────
function renderWashPoints(points) {
  var grid = document.getElementById('wash-points-grid');
  if (!points || !points.length) {
    grid.innerHTML = '<div style="color:var(--grey);font-size:14px">No wash points yet. Add one above.</div>';
    return;
  }
  grid.innerHTML = points.map(function(p) {
    return '<div class="op-card">' +
      '<div class="op-card-name">💧 ' + p.name + '</div>' +
      '<div class="op-card-email">' + p.area + '</div>' +
      '<div class="op-card-point" style="color:var(--grey)">📌 ' + parseFloat(p.lat).toFixed(4) + ', ' + parseFloat(p.lng).toFixed(4) + '</div>' +
      '<button class="btn btn-danger" style="padding:6px 14px;font-size:12px;margin-top:4px" onclick="deleteWashPoint(\'' + p.id + '\')">Remove</button>' +
    '</div>';
  }).join('');
}

function populatePointDropdown(points) {
  var sel = document.getElementById('new-op-point');
  var current = sel.value;
  sel.innerHTML = '<option value="">Select wash point</option>';
  (points || []).forEach(function(p) {
    var opt = document.createElement('option');
    opt.value = p.name;
    opt.textContent = p.name;
    sel.appendChild(opt);
  });
  if (current) sel.value = current;
}

function showAddPointModal() { document.getElementById('add-point-modal').classList.add('show'); }
function hideAddPointModal() {
  document.getElementById('add-point-modal').classList.remove('show');
  document.getElementById('new-point-name').value = '';
  document.getElementById('new-point-area').value = '';
  document.getElementById('new-point-lat').value  = '';
  document.getElementById('new-point-lng').value  = '';
  document.getElementById('add-point-error').textContent = '';
}

async function createWashPoint() {
  var name = document.getElementById('new-point-name').value.trim();
  var area = document.getElementById('new-point-area').value.trim();
  var lat  = document.getElementById('new-point-lat').value.trim();
  var lng  = document.getElementById('new-point-lng').value.trim();
  var err  = document.getElementById('add-point-error');
  if (!name || !area || !lat || !lng) { err.textContent = 'All fields are required.'; return; }
  if (isNaN(parseFloat(lat)) || isNaN(parseFloat(lng))) { err.textContent = 'Latitude and longitude must be valid numbers.'; return; }
  setBtn('add-point-btn', true, 'Add Wash Point');
  try {
    await sbFetch('wash_points', { method: 'POST', body: JSON.stringify({ name: name, area: area, lat: parseFloat(lat), lng: parseFloat(lng) }), prefer: 'return=representation' });
    toast('Wash point added!');
    hideAddPointModal();
    loadData();
  } catch(e) { err.textContent = 'Error: ' + e.message; }
  finally { setBtn('add-point-btn', false, 'Add Wash Point'); }
}

async function deleteWashPoint(id) {
  if (!confirm('Remove this wash point? This will not affect existing bookings.')) return;
  try {
    await sbFetch('wash_points?id=eq.' + id, { method: 'DELETE', prefer: 'return=minimal' });
    toast('Wash point removed.');
    loadData();
  } catch(e) { toast('Error: ' + e.message, true); }
}

// ── OPERATORS ─────────────────────────────────────────────────────
function renderOperators(operators) {
  var grid = document.getElementById('operators-grid');
  if (!operators.length) { grid.innerHTML = '<div style="color:var(--grey);font-size:14px">No operators yet. Add one above.</div>'; return; }
  grid.innerHTML = operators.map(function(op) {
    return '<div class="op-card">' +
      '<div class="op-card-name">' + (op.full_name || op.name || '—') + '</div>' +
      '<div class="op-card-email">' + op.email + '</div>' +
      '<div class="op-card-point">📍 ' + op.wash_point + '</div>' +
      '<button class="btn btn-danger" style="padding:6px 14px;font-size:12px" onclick="deleteOperator(\'' + op.id + '\')">Remove</button>' +
    '</div>';
  }).join('');
}

function showCreateModal() { document.getElementById('create-modal').classList.add('show'); }
function hideCreateModal() {
  document.getElementById('create-modal').classList.remove('show');
  document.getElementById('new-op-name').value = '';
  document.getElementById('new-op-email').value = '';
  document.getElementById('new-op-pass').value = '';
  document.getElementById('new-op-point').value = '';
  document.getElementById('create-error').textContent = '';
}

async function createOperator() {
  var name  = document.getElementById('new-op-name').value.trim();
  var email = document.getElementById('new-op-email').value.trim().toLowerCase();
  var pass  = document.getElementById('new-op-pass').value;
  var point = document.getElementById('new-op-point').value;
  var err   = document.getElementById('create-error');
  if (!name || !email || !pass || !point) { err.textContent = 'Please fill in all fields.'; return; }
  setBtn('create-btn', true, 'Create Operator');
  try {
    var custCheck = await sbFetch('profiles?email=eq.' + encodeURIComponent(email) + '&select=email');
    if (custCheck && custCheck.length) { err.textContent = 'This email is already registered as a customer account.'; return; }
    var opCheck = await sbFetch('operators?email=eq.' + encodeURIComponent(email) + '&select=email');
    if (opCheck && opCheck.length) { err.textContent = 'An operator with this email already exists.'; return; }
    await sbFetch('operators', { method: 'POST', body: JSON.stringify({ name: name, email: email, password: pass, wash_point: point }), prefer: 'return=representation' });
    toast('Operator created successfully!');
    hideCreateModal();
    loadData();
  } catch(e) { err.textContent = 'Error: ' + e.message; }
  finally { setBtn('create-btn', false, 'Create Operator'); }
}

async function deleteOperator(id) {
  if (!confirm('Remove this operator? They will lose access immediately.')) return;
  try {
    await sbFetch('operators?id=eq.' + id, { method: 'DELETE', prefer: 'return=minimal' });
    toast('Operator removed.');
    loadData();
  } catch(e) { toast('Error: ' + e.message, true); }
}

// ── SUBSCRIBERS ───────────────────────────────────────────────────
function renderSubscribers(subs) {
  var tbody = document.getElementById('subs-table-body');
  if (!subs.length) { tbody.innerHTML = '<tr><td colspan="6" style="color:var(--grey);text-align:center;padding:20px">No subscribers yet</td></tr>'; return; }
  tbody.innerHTML = subs.map(function(u) {
    var badgeCls = u.sub_status === 'active' ? 'badge-active' : 'badge-pending';
    return '<tr>' +
      '<td>' + (u.name || '—') + '</td>' +
      '<td>' + (u.phone || '—') + '</td>' +
      '<td>' + (u.plan || '—') + '</td>' +
      '<td style="color:var(--gold);font-weight:700">' + (u.plan === 'Fleet' ? '∞' : (u.credits || 0)) + '</td>' +
      '<td><span class="status-badge ' + badgeCls + '">' + (u.sub_status || 'pending') + '</span></td>' +
      '<td style="font-weight:700;letter-spacing:1px">' + (u.plate || '—') + '</td>' +
    '</tr>';
  }).join('');
}
</script>
</body>
